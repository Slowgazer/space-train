<!-- 太空列车物语 - 入口 HTML -->
<!-- HTML、CSS、JS 分别独立引用，遵循关注点分离原则 -->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>太空列车物语</title>
  <!-- 全局样式表 -->
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- 游戏容器，Three.js 将在此渲染 3D 场景 -->
  <div id="game-container"></div>
  <!-- 小游戏容器（p5.js 覆盖层） -->
  <div id="minigame-container" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:500;pointer-events:none;display:none"></div>
  <!-- p5.js 库（全局模式加载） -->
  <script src="/p5.min.js"></script>
  <!-- 主入口脚本，使用 ES Module 方式加载 -->
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
